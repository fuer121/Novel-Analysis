      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: end
      id: 2000000000303-source-2000000000304-target
      source: '2000000000303'
      sourceHandle: source
      target: '2000000000304'
      targetHandle: target
      type: custom
      zIndex: 0

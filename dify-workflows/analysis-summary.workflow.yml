          variable: context_json
      height: 372
      id: '2000000000301'
      position:
        x: 80
        y: 240
      positionAbsolute:
        x: 80
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 300
    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: analysis-summary-system
          role: system
          text: |
            你是小说分析汇总引擎。
            如果用户给出了 Schema JSON，必须严格按 Schema 输出；
            如果 Schema 为空，则按用户要求输出纯文本。
            不要输出 Markdown，不要附加解释。
        - id: analysis-summary-user
          role: user
          text: |
            任务类型：{{#2000000000301.task_type#}}
            指令：
            {{#2000000000301.prompt#}}

            Schema名称：{{#2000000000301.schema_name#}}
            Schema JSON：
            {{#2000000000301.schema_json#}}

            严格Schema：{{#2000000000301.strict_json_schema#}}
            最大输出Token：{{#2000000000301.max_output_tokens#}}
            推理强度：{{#2000000000301.reasoning_effort#}}
            期望模型：{{#2000000000301.model#}}

            汇总上下文：
            {{#2000000000301.context_json#}}
        selected: false
        title: 生成汇总结果
        type: llm
        vision:
          enabled: false
      height: 92
      id: '2000000000302'
      position:
        x: 460
        y: 300
      positionAbsolute:
        x: 460
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 260
    - data:
        code: |
          def main(text: str):
              import json
              import re

              raw = (text or "").strip()
              fenced = re.sub(r"^```(?:json)?", "", raw).strip()
              fenced = re.sub(r"```$", "", fenced).strip()

              try:
                  parsed = json.loads(fenced)
                  return {"result": json.dumps(parsed, ensure_ascii=False)}
              except Exception:
                  return {"result": fenced}
        code_language: python3
        outputs:
          result:
            children: null
            type: string
        selected: false
        title: 规范输出
        type: code
        variables:
        - value_selector:
          - '2000000000302'
          - text
          value_type: string
          variable: text
      height: 52
      id: '2000000000303'
      position:
        x: 800
        y: 300
      positionAbsolute:
        x: 800
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 260
    - data:
        outputs:
        - value_selector:
          - '2000000000303'
          - result
          value_type: string
          variable: result
        selected: false
        title: 输出
        type: end
      height: 88
      id: '2000000000304'
      position:
        x: 1140
        y: 300
      positionAbsolute:
        x: 1140
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 260
    viewport:
      x: 120
      y: 160
      zoom: 0.55
  rag_pipeline_variables: []

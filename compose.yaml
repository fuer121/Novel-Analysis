services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel_dev_only
      POSTGRES_DB: novel_analysis
    ports:
      - "55432:5432"
    volumes:
      - phase1-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  phase1-postgres:

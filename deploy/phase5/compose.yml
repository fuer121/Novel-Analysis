{
  "services": {
    "caddy": {
      "image": "${CADDY_IMAGE:?set CADDY_IMAGE}",
      "ports": ["443:443", "443:443/udp"],
      "environment": {
        "APP_ORIGIN": "${APP_ORIGIN:?set APP_ORIGIN}"
      },
      "volumes": [
        "./Caddyfile:/etc/caddy/Caddyfile:ro",
        "caddy_data:/data",
        "caddy_config:/config"
      ],
      "networks": ["edge", "internal"],
      "depends_on": {
        "api": { "condition": "service_healthy" }
      },
      "healthcheck": {
        "test": ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"],
        "interval": "30s",
        "timeout": "5s",
        "retries": 3
      },
      "restart": "unless-stopped",
      "logging": {
        "driver": "json-file",
        "options": { "max-size": "10m", "max-file": "3" }
      }
    },
    "api": {
      "image": "${API_IMAGE:?set API_IMAGE}",
      "environment": {
        "APP_ORIGIN": "${APP_ORIGIN:?set APP_ORIGIN}",
        "FEISHU_REDIRECT_URI": "${FEISHU_REDIRECT_URI:?set FEISHU_REDIRECT_URI}",
        "FEISHU_APP_ID": "${FEISHU_APP_ID:?set FEISHU_APP_ID}",
        "FEISHU_APP_SECRET": "${FEISHU_APP_SECRET:?set FEISHU_APP_SECRET}",
        "DATABASE_URL": "${DATABASE_URL:?set DATABASE_URL}",
        "CONTENT_ENCRYPTION_KEY": "${CONTENT_ENCRYPTION_KEY:?set CONTENT_ENCRYPTION_KEY}",
        "CONTENT_ENCRYPTION_KEY_VERSION": "${CONTENT_ENCRYPTION_KEY_VERSION:?set CONTENT_ENCRYPTION_KEY_VERSION}",
        "CONTENT_HMAC_KEY": "${CONTENT_HMAC_KEY:?set CONTENT_HMAC_KEY}",
        "ADVANCED_ANALYSIS_MODEL": "${ADVANCED_ANALYSIS_MODEL:?set ADVANCED_ANALYSIS_MODEL}",
        "ADVANCED_ANALYSIS_REASONING_EFFORT": "${ADVANCED_ANALYSIS_REASONING_EFFORT:?set ADVANCED_ANALYSIS_REASONING_EFFORT}",
        "ADVANCED_ANALYSIS_EXECUTOR_VERSION": "${ADVANCED_ANALYSIS_EXECUTOR_VERSION:?set ADVANCED_ANALYSIS_EXECUTOR_VERSION}",
        "PORT": "3000"
      },
      "networks": ["internal"],
      "depends_on": {
        "postgres": { "condition": "service_healthy" }
      },
      "healthcheck": {
        "test": ["CMD", "node", "--version"],
        "interval": "30s",
        "timeout": "5s",
        "retries": 3
      },
      "restart": "unless-stopped",
      "logging": {
        "driver": "json-file",
        "options": { "max-size": "10m", "max-file": "3" }
      }
    },
    "worker": {
      "image": "${WORKER_IMAGE:?set WORKER_IMAGE}",
      "environment": {
        "DATABASE_URL": "${DATABASE_URL:?set DATABASE_URL}",
        "CONTENT_ENCRYPTION_KEY": "${CONTENT_ENCRYPTION_KEY:?set CONTENT_ENCRYPTION_KEY}",
        "CONTENT_ENCRYPTION_KEY_VERSION": "${CONTENT_ENCRYPTION_KEY_VERSION:?set CONTENT_ENCRYPTION_KEY_VERSION}",
        "CONTENT_HMAC_KEY": "${CONTENT_HMAC_KEY:?set CONTENT_HMAC_KEY}",
        "DIFY_BASE_URL": "${DIFY_BASE_URL:?set DIFY_BASE_URL}",
        "DIFY_CHAPTER_IMPORT_KEY": "${DIFY_CHAPTER_IMPORT_KEY:?set DIFY_CHAPTER_IMPORT_KEY}",
        "DIFY_L1_WORKFLOW_API_KEY": "${DIFY_L1_WORKFLOW_API_KEY:?set DIFY_L1_WORKFLOW_API_KEY}",
        "DIFY_L2_WORKFLOW_API_KEY": "${DIFY_L2_WORKFLOW_API_KEY:?set DIFY_L2_WORKFLOW_API_KEY}",
        "DIFY_ANALYSIS_SUMMARY_KEY": "${DIFY_ANALYSIS_SUMMARY_KEY:?set DIFY_ANALYSIS_SUMMARY_KEY}",
        "ADVANCED_ANALYSIS_MODEL": "${ADVANCED_ANALYSIS_MODEL:?set ADVANCED_ANALYSIS_MODEL}",
        "ADVANCED_ANALYSIS_REASONING_EFFORT": "${ADVANCED_ANALYSIS_REASONING_EFFORT:?set ADVANCED_ANALYSIS_REASONING_EFFORT}",
        "ADVANCED_ANALYSIS_EXECUTOR_VERSION": "${ADVANCED_ANALYSIS_EXECUTOR_VERSION:?set ADVANCED_ANALYSIS_EXECUTOR_VERSION}"
      },
      "networks": ["internal"],
      "depends_on": {
        "postgres": { "condition": "service_healthy" }
      },
      "healthcheck": {
        "test": ["CMD-SHELL", "kill -0 1"],
        "interval": "30s",
        "timeout": "5s",
        "retries": 3
      },
      "restart": "unless-stopped",
      "logging": {
        "driver": "json-file",
        "options": { "max-size": "10m", "max-file": "3" }
      }
    },
    "postgres": {
      "image": "${POSTGRES_IMAGE:?set POSTGRES_IMAGE}",
      "environment": {
        "POSTGRES_DB": "${POSTGRES_DB:?set POSTGRES_DB}",
        "POSTGRES_USER": "${POSTGRES_USER:?set POSTGRES_USER}",
        "POSTGRES_PASSWORD": "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      },
      "volumes": ["postgres_data:/var/lib/postgresql/data"],
      "networks": ["internal"],
      "healthcheck": {
        "test": ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""],
        "interval": "10s",
        "timeout": "5s",
        "retries": 5
      },
      "restart": "unless-stopped",
      "logging": {
        "driver": "json-file",
        "options": { "max-size": "10m", "max-file": "3" }
      }
    }
  },
  "networks": {
    "edge": {},
    "internal": { "internal": true }
  },
  "volumes": {
    "caddy_data": {},
    "caddy_config": {},
    "postgres_data": {}
  }
}
